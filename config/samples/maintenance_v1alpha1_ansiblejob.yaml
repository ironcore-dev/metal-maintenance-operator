apiVersion: ansible.maintenance.metal.ironcore.dev/v1alpha1
kind: AnsibleJob
metadata:
  labels:
    app.kubernetes.io/name: maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: sample-ansible-job
spec:
  playbook:
    name: "site.yml"
    repository: "https://github.com/example/ansible-playbooks.git"
    gitRef: "main"
  roles:
    repository: "https://github.com/example/ansible-roles.git"
    gitRef: "v1.5.0"
  inventory:
    inline: |
      [servers]
      server1 ansible_host=192.168.1.10
      server2 ansible_host=192.168.1.11

      [servers:vars]
      ansible_user=ansible
      ansible_ssh_private_key_file=/etc/ansible/ssh_key
  extraVars:
    - name: environment
      value: "production"
    - name: version
      value: "1.0.0"
  limit: "servers"
  timeoutSeconds: 3600
  jobTemplate:
    image: "quay.io/ansible/ansible-runner:stable-2.12-latest@sha256:001a4bde411be863d54c1d293f3d2e7b0ff0e67ef5d7b2f9f7fb56b61694f4e8"
    serviceAccountName: "ansible-runner"
    backoffLimit: 3
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
