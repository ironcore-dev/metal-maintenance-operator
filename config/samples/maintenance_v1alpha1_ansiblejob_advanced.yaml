# Advanced sample AnsibleJob showing roles repository and complex configuration
apiVersion: ansible.maintenance.metal.ironcore.dev/v1alpha1
kind: AnsibleJob
metadata:
  labels:
    app.kubernetes.io/name: maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: ansiblejob-advanced-sample
  namespace: default
spec:
  # Playbook configuration
  playbook:
    name: site.yml
    repository: "https://github.com/example/ansible-playbooks.git"
    gitRef: "v1.0.0"

  # Repository containing Ansible roles
  roles:
    repository: "https://github.com/example/ansible-roles.git"
    gitRef: "v2.1.0"

  # Ansible inventory in YAML or INI format
  inventory:
    inline: |
      [webservers]
      web1.example.com
      web2.example.com

      [databases]
      db1.example.com

      [all:vars]
      ansible_user=admin

  # Extra variables to pass to the playbook
  extraVars:
    - name: environment
      value: production
    - name: backup_enabled
      value: "true"
    - name: maintenance_window
      value: "02:00-04:00"

  # Job template configuration
  jobTemplate:
    image: "quay.io/ansible/ansible-runner:stable-2.12-latest@sha256:001a4bde411be863d54c1d293f3d2e7b0ff0e67ef5d7b2f9f7fb56b61694f4e8"
    serviceAccountName: "ansible-runner"
    backoffLimit: 2
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "100m"
        memory: "256Mi"
