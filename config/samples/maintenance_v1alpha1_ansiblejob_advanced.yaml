# Advanced sample AnsibleJob showing roles repository and complex configuration
apiVersion: maintenance.metal.ironcore.dev/v1alpha1
kind: AnsibleJob
metadata:
  labels:
    app.kubernetes.io/name: maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: ansiblejob-advanced-sample
  namespace: default
spec:
  # Playbook to execute from the playbook repository
  playbook: site.yml

  # Repository containing Ansible playbooks
  playbookRepo: "https://github.com/example/ansible-playbooks.git"

  # Git reference for playbook repository (branch, tag, or commit)
  playbookGitRef: "v1.0.0"

  # Repository containing Ansible roles
  rolesRepo: "https://github.com/example/ansible-roles.git"

  # Git reference for roles repository (branch, tag, or commit)
  rolesGitRef: "v2.1.0"

  # Ansible inventory in YAML or INI format
  inventory:
    inline: |
      [webservers]
      web1.example.com
      web2.example.com

      [databases]
      db1.example.com

      [all:vars]
      ansible_user=admin

  # Extra variables to pass to the playbook
  extraVars:
    environment: production
    backup_enabled: "true"
    maintenance_window: "02:00-04:00"

  # Job template configuration
  jobTemplate:
    image: "quay.io/ansible/ansible-runner:latest"
    serviceAccountName: "ansible-runner"
    backoffLimit: 2
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
