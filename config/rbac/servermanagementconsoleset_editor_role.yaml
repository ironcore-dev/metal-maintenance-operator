# This rule is not used by the project maintenance-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the console.maintenance.metal.ironcore.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: servermanagementconsoleset-editor-role
rules:
- apiGroups:
  - console.maintenance.metal.ironcore.dev
  resources:
  - servermanagementconsolesets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - console.maintenance.metal.ironcore.dev
  resources:
  - servermanagementconsolesets/status
  verbs:
  - get
