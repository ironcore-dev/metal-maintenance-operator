# This rule is not used by the project maintenance-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over maintenance.maintenance.ironcore.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: dellfirmwareupdateome-admin-role
rules:
- apiGroups:
  - maintenance.maintenance.ironcore.dev
  resources:
  - dellfirmwareupdateomes
  verbs:
  - '*'
- apiGroups:
  - maintenance.maintenance.ironcore.dev
  resources:
  - dellfirmwareupdateomes/status
  verbs:
  - get
