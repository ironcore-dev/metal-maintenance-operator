# This rule is not used by the project maintenance-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to maintenance.ironcore.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: bmccompliance-viewer-role
rules:
- apiGroups:
  - maintenance.ironcore.dev
  resources:
  - bmccompliances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - maintenance.ironcore.dev
  resources:
  - bmccompliances/status
  verbs:
  - get
