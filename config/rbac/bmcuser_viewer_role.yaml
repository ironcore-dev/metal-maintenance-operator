# This rule is not used by the project metal-maintenance-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to bmc.metal.ironcore.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: metal-maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: bmcuser-viewer-role
rules:
- apiGroups:
  - bmc.metal.ironcore.dev
  resources:
  - bmcusers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - bmc.metal.ironcore.dev
  resources:
  - bmcusers/status
  verbs:
  - get
