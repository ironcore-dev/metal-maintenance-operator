# This rule is not used by the project maintenance-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the maintenance.ironcore.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: metal-maintenance-operator
    app.kubernetes.io/managed-by: kustomize
  name: firmwareupdatedell-editor-role
rules:
- apiGroups:
  - vendorconsole.metal.ironcore.dev
  resources:
  - firmwareupdatedells
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vendorconsole.metal.ironcore.dev
  resources:
  - firmwareupdatedells/status
  verbs:
  - get
