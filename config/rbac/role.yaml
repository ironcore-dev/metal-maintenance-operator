---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - maintenance.metal.ironcore.dev
  resources:
  - consoles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - maintenance.metal.ironcore.dev
  resources:
  - consoles/finalizers
  verbs:
  - update
- apiGroups:
  - maintenance.metal.ironcore.dev
  resources:
  - consoles/status
  verbs:
  - get
  - patch
  - update
