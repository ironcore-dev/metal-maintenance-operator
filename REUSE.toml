version = 1
SPDX-PackageName = "metal-maintenance-operator"
SPDX-PackageSupplier = "IronCore authors <ospo@sap.com>"
SPDX-PackageDownloadLocation = "https://github.com/ironcore-dev/metal-maintenance-operator"

[[annotations]]
path = [
    ".devcontainer/**",
    ".github/**",
    ".gitignore",
    ".dockerignore",
    ".golangci.yml",
    ".custom-gcl.yml",
    "CODEOWNERS",
    "Dockerfile",
    "Makefile",
    "PROJECT",
    "config/**",
    "dist/**",
    "go.mod",
    "go.sum",
    "REUSE.toml",
    "hack/**",
    "internal/hwmgr/mock/**"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2024 SAP SE or an SAP affiliate company and IronCore contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
    "docs/**",
    "README.md",
    "AGENTS.md",
    "CLAUDE.md"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2024 SAP SE or an SAP affiliate company and IronCore contributors"
SPDX-License-Identifier = "Apache-2.0"
