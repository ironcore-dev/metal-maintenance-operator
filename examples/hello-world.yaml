---
apiVersion: maintenance.metal.ironcore.dev/v1alpha1
kind: AnsibleJob
metadata:
  name: hello-world
  namespace: default
spec:
  # Runs ansible-runner to execute playbooks

  # Use example playbook for demonstration
  playbook: "hello_world.yml"

  # Use ansible samples repository
  playbookRepo: "https://github.com/ansible/ansible-tower-samples"

  # Use git reference for playbook repository
  playbookGitRef: "master"

  # Simple inventory targeting localhost
  inventory:
    inline: |
      [web]
      localhost ansible_connection=local

      [web:vars]
      ansible_python_interpreter=/usr/bin/python3

  # Extra variables (passed to the playbook)
  extraVars:
    - name: deployment_environment
      value: "kubernetes"
    - name: message
      value: "Hello from maintenance-operator!"

  # Timeout in seconds
  timeoutSeconds: 300

  # Job template configuration
  jobTemplate:
    image: "quay.io/ansible/ansible-runner:latest"
    backoffLimit: 1
    resources:
      limits:
        - name: cpu
          quantity: "500m"
        - name: memory
          quantity: "512Mi"
      requests:
        - name: cpu
          quantity: "100m"
        - name: memory
          quantity: "128Mi"
