apiVersion: maintenance.metal.ironcore.dev/v1alpha1
kind: AnsibleJob
metadata:
  name: test-conditions
  namespace: default
spec:
  playbook: site.yml
  playbookRepo: https://github.com/example/ansible-playbooks.git
  inventory:
    inline: |
      [test_hosts]
      localhost ansible_connection=local
  extraVars:
    - name: test_var
      value: test_value
  jobTemplate:
    image: quay.io/ansible/ansible-runner:stable-2.12-latest@sha256:001a4bde411be863d54c1d293f3d2e7b0ff0e67ef5d7b2f9f7fb56b61694f4e8
    backoffLimit: 2
