{{- if .Values.rbac.enable }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: metal-maintenance-operator-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - maintenance.metal.ironcore.dev
  resources:
  - consoles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - maintenance.metal.ironcore.dev
  resources:
  - consoles/finalizers
  verbs:
  - update
- apiGroups:
  - maintenance.metal.ironcore.dev
  resources:
  - consoles/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - metal.ironcore.dev
  resources:
  - bmcs
  - bmcsecrets
  - servers
  verbs:
  - get
  - list
  - watch
{{- end -}}
