{{- if and .Values.metrics.enable .Values.metrics.secure }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "metal-maintenance-operator.resourceName" (dict "suffix" "metrics-reader" "context" $) }}
rules:
- nonResourceURLs:
  # Standard Prometheus scrape endpoint.
  - /metrics
  # BMC service-discovery endpoint (redfish-exporter http_sd_configs).
  - /sd/bmcs
  verbs:
  - get
{{- end }}
