rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: metal-maintenance-operator
  name: metal-maintenance-operator-leader-election-rolebinding
  namespace: metal-maintenance-operator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: metal-maintenance-operator-leader-election-role
subjects:
- kind: ServiceAccount
  name: metal-maintenance-operator-controller-manager
  namespace: metal-maintenance-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: metal-maintenance-operator
  name: metal-maintenance-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metal-maintenance-operator-manager-role
subjects:
- kind: ServiceAccount
  name: metal-maintenance-operator-controller-manager
  namespace: metal-maintenance-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metal-maintenance-operator-metrics-auth-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metal-maintenance-operator-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: metal-maintenance-operator-controller-manager
  namespace: metal-maintenance-operator-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: metal-maintenance-operator
    control-plane: controller-manager
  name: metal-maintenance-operator-controller-manager-metrics-service
  namespace: metal-maintenance-operator-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: metal-maintenance-operator
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: metal-maintenance-operator
    control-plane: controller-manager
  name: metal-maintenance-operator-controller-manager
  namespace: metal-maintenance-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metal-maintenance-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: metal-maintenance-operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: FORCE_ENV_IN_CHART
          value: "true"
        image: controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: metal-maintenance-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
